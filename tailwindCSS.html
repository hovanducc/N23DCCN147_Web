<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Tailwind Exercise</title>
</head>
<body class="bg-gray-50">

  <nav class="bg-blue-600 text-white p-4 flex justify-between items-center">
    <div class="font-bold text-lg">MySite</div>
    
    <div class="md:hidden">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
      </svg>
    </div>

    <ul class="hidden md:flex space-x-6 text-sm">
      <li class="hover:underline cursor-pointer">Home</li>
      <li class="hover:underline cursor-pointer">About</li>
      <li class="hover:underline cursor-pointer">Contact</li>
    </ul>
  </nav>

  <main class="max-w-6xl mx-auto mt-10 p-6 flex flex-col md:flex-row items-center justify-center gap-10 min-h-[60vh]">
    
    <div class="w-48 md:w-64">
      <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Tailwind_CSS_Logo.svg" alt="Tailwind Logo" class="w-full">
    </div>

    <div class="text-center md:text-left">
      <h1 class="text-3xl md:text-5xl font-bold text-gray-800">Learn Tailwind CSS</h1>
      <p class="text-gray-600 mt-4 max-w-sm">
        Build responsive layouts quickly with utility-first CSS.
      </p>
      <button class="mt-6 bg-blue-600 text-white px-6 py-2 rounded shadow-md hover:bg-blue-700 transition duration-300">
        Get Started
      </button>
    </div>

  </main>

</body>
</html>
